name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing situation that's awkward or missing today.
      placeholder: |
        When playing doubles, there's no way to track which team scored — the app assumes singles.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Voice commands? UI changes? Settings?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Voice / xAI integration
        - Score state machine
        - Watch UI
        - iOS companion
        - Match history / iCloud
        - Other
    validations:
      required: true
